services:
  - type: web
    name: hashverse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: CORS_ORIGINS
        value: https://hashverse-two.vercel.app,http://localhost:3000
      - key: BACKEND_URL
        fromService:
          type: web
          name: hashverse-api
          property: host
